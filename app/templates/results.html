<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <style>
        body { font-family: system-ui, sans-serif; line-height: 1.6; }
        .article { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        button { padding: .5rem 1rem; font-size: 1rem; cursor: pointer; margin-top: 1.5rem; }
        #meta { color: #777; font-size: .85rem; margin-bottom: 1rem; }
        #meta a { color: #1a4fce; }
        #loading { text-align: center; color: #555; margin: 3rem 0; }
        .spinner {
            width: 40px; height: 40px; margin: 1rem auto;
            border: 4px solid #ddd; border-top-color: #1a4fce; border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="article">
        <h1>Results for: {{ query }}</h1>

        <div id="loading">
            <div class="spinner"></div>
            <p>Gathering articles and merging them… this can take a few seconds.</p>
        </div>

        <div id="meta" hidden>
            <span id="meta-text"></span><a id="refresh-link" href="#">Refresh</a>
        </div>
        <div id="article"></div>
        <button onclick="window.location.href='/'">Back to Search</button>
    </div>

    <script>
        const query = {{ query | tojson }};
        const isRefresh = new URLSearchParams(window.location.search).get('refresh') === '1';
        const apiUrl = '/api/article?query=' + encodeURIComponent(query) + (isRefresh ? '&refresh=1' : '');

        // Refresh re-runs the pipeline (bypasses the cache) for this query.
        const refreshLink = document.getElementById('refresh-link');
        refreshLink.href = '/results?query=' + encodeURIComponent(query) + '&refresh=1';

        fetch(apiUrl)
            .then(response => {
                if (!response.ok) throw new Error('Request failed');
                return response.json();
            })
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                // data.html is sanitized server-side with nh3 before it is sent.
                document.getElementById('article').innerHTML = data.html;

                let label = data.cached ? 'Loaded from cache' : 'Freshly generated';
                if (data.created_at) {
                    label += ' · ' + new Date(data.created_at * 1000).toLocaleString();
                }
                // textContent (not innerHTML) keeps the query/text inert.
                document.getElementById('meta-text').textContent = label + ' · ';
                document.getElementById('meta').hidden = false;
            })
            .catch(() => {
                document.getElementById('loading').innerHTML =
                    '<p>Something went wrong while building the article. Please try again.</p>';
            });
    </script>
</body>
</html>
