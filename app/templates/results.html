{% extends "base.html" %}

{% block title %}{{ query }} · News Article Merger{% endblock %}

{% block content %}
<button class="btn btn-ghost back back-top" onclick="window.location.href='/'">← Back to Search</button>
<h1>{{ query }}</h1>

<div id="loading">
    <div class="spinner"></div>
    <p>Gathering articles and writing the merged story…</p>
</div>

<div id="meta" hidden></div>
<div id="tldr" class="tldr" hidden></div>
<div id="article"></div>

<div id="perspectives-wrap" hidden>
    <div class="section-label"><span>Differing perspectives</span></div>
    <p class="hint" id="persp-hint"></p>
    <div id="perspectives"></div>
</div>

<div id="sources-wrap" hidden>
    <div class="section-label"><span>Sources</span></div>
    <ol id="sources" class="sources"></ol>
</div>

<div id="controls" hidden>
    <button class="btn btn-ghost" id="copy-btn">Copy as Markdown</button>
    <button class="btn btn-ghost" id="print-btn">Print / Save PDF</button>
    <button class="btn btn-ghost" id="link-btn">Copy link</button>
</div>
<button class="btn btn-ghost back" onclick="window.location.href='/'">← Back to Search</button>

<div id="popover"></div>
{% endblock %}

{% block scripts %}
<script>
    const query = {{ query | tojson }};
    const isRefresh = new URLSearchParams(window.location.search).get('refresh') === '1';
    const el = (id) => document.getElementById(id);
    let current = null;          // latest done payload (for export)
    let finished = false;        // guards against EventSource auto-reconnect
    let sourceNameMap = {};      // source id -> outlet name

    const streamUrl = '/api/article/stream?query=' + encodeURIComponent(query) +
        (isRefresh ? '&refresh=1' : '');
    const es = new EventSource(streamUrl);

    // Article streams in; data.html is already sanitized server-side.
    es.addEventListener('delta', (e) => {
        el('loading').style.display = 'none';
        el('article').innerHTML = JSON.parse(e.data).html;
    });

    es.addEventListener('done', (e) => {
        finished = true; es.close();
        current = JSON.parse(e.data);
        el('loading').style.display = 'none';
        el('article').innerHTML = current.article_html;
        sourceNameMap = {};
        (current.sources || []).forEach((s) => { sourceNameMap[s.id] = s.name; });
        renderTldr(current.tldr);
        renderSources(current.sources);
        wirePerspectives(current.perspectives);   // inline hover (when marks exist)
        renderPerspectives(current.perspectives); // always-on panel
        wireCitations();
        renderMeta(current);
        el('controls').hidden = false;
    });

    es.addEventListener('error', (e) => {
        finished = true; es.close();
        el('loading').innerHTML = '<p>Something went wrong while building the article. Please try again.</p>';
        el('loading').style.display = 'block';
    });

    // If the connection drops before we finished, surface it (and stop retrying).
    es.onerror = () => {
        if (finished) return;
        finished = true; es.close();
        el('loading').innerHTML = '<p>Connection lost while building the article. Please try again.</p>';
    };

    function renderMeta(d) {
        let label = d.cached ? 'Loaded from cache' : 'Freshly generated';
        if (d.created_at) label += ' · ' + new Date(d.created_at * 1000).toLocaleString();
        const m = el('meta');
        m.textContent = label + ' · ';
        const a = document.createElement('a');
        a.href = '/results?query=' + encodeURIComponent(query) + '&refresh=1';
        a.textContent = 'Refresh';
        m.appendChild(a);
        m.hidden = false;
    }

    function renderTldr(items) {
        if (!items || !items.length) return;
        const box = el('tldr');
        box.innerHTML = '<h2>TL;DR</h2>';
        const ul = document.createElement('ul');
        items.forEach((it) => {
            const li = document.createElement('li');
            li.textContent = it.text;                 // textContent = inert
            if (it.anchor) li.onclick = () => scrollToFlash(el('article').querySelector('#' + cssId(it.anchor)));
            ul.appendChild(li);
        });
        box.appendChild(ul);
        box.hidden = false;
    }

    function renderSources(sources) {
        if (!sources || !sources.length) return;
        const ol = el('sources');
        sources.forEach((s) => {
            const li = document.createElement('li');
            li.id = 'src-' + s.id;
            const a = document.createElement('a');
            a.href = s.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
            a.textContent = (s.title || 'Untitled') + ' — ' + (s.name || '');
            li.appendChild(a);
            ol.appendChild(li);
        });
        el('sources-wrap').hidden = false;
    }

    function wireCitations() {
        el('article').querySelectorAll('sup.cite').forEach((sup) => {
            sup.onclick = () => scrollToFlash(el('src-' + sup.dataset.src));
        });
    }

    // Build a view list (Source name: stance) into a container, via textContent.
    function appendViews(container, views) {
        (views || []).forEach((v) => {
            const div = document.createElement('div');
            div.className = 'view';
            const b = document.createElement('b');
            b.textContent = (sourceNameMap[v.source] || ('Source ' + v.source)) + ': ';
            div.appendChild(b);
            div.appendChild(document.createTextNode(v.stance || ''));
            container.appendChild(div);
        });
    }

    // Inline hover popovers on any <mark> the model emitted (best-effort).
    function wirePerspectives(perspectives) {
        const byId = {};
        (perspectives || []).forEach((p) => { byId[p.id] = p; });
        const pop = el('popover');
        el('article').querySelectorAll('mark.persp').forEach((mark) => {
            const p = byId[mark.dataset.persp];
            if (!p) return;
            const show = () => {
                pop.innerHTML = '';
                const h = document.createElement('h4');
                h.textContent = p.summary || 'Differing perspectives';
                pop.appendChild(h);
                appendViews(pop, p.views);
                const r = mark.getBoundingClientRect();
                pop.style.top = (window.scrollY + r.bottom + 6) + 'px';
                pop.style.left = (window.scrollX + r.left) + 'px';
                pop.style.display = 'block';
            };
            mark.addEventListener('mouseenter', show);
            mark.addEventListener('click', show);
            mark.addEventListener('mouseleave', () => { pop.style.display = 'none'; });
        });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') pop.style.display = 'none'; });
    }

    // Always-on panel listing every perspective (reliable even without marks).
    function renderPerspectives(perspectives) {
        if (!perspectives || !perspectives.length) return;
        const marks = {};
        el('article').querySelectorAll('mark.persp').forEach((m) => { marks[m.dataset.persp] = m; });
        el('persp-hint').textContent = Object.keys(marks).length
            ? 'Highlighted phrases above are contested — hover them, or read the breakdown here.'
            : 'Where the sources disagree or frame things differently:';
        const wrap = el('perspectives');
        perspectives.forEach((p) => {
            const card = document.createElement('div');
            card.className = 'persp-card';
            const h = document.createElement('h4');
            h.textContent = p.summary || 'Differing perspectives';
            card.appendChild(h);
            appendViews(card, p.views);
            if (marks[p.id]) {
                const btn = document.createElement('button');
                btn.className = 'goto';
                btn.textContent = 'Find in article';
                btn.onclick = () => scrollToFlash(marks[p.id]);
                card.appendChild(btn);
            }
            wrap.appendChild(card);
        });
        el('perspectives-wrap').hidden = false;
    }

    function scrollToFlash(node) {
        if (!node) return;
        node.scrollIntoView({ behavior: 'smooth', block: 'center' });
        node.classList.remove('flash'); void node.offsetWidth; node.classList.add('flash');
    }

    // CSS.escape fallback for ids that begin with a digit etc.
    function cssId(id) { return (window.CSS && CSS.escape) ? CSS.escape(id) : id; }

    // --- Export ---
    el('print-btn').onclick = () => window.print();
    el('link-btn').onclick = () => {
        const url = location.origin + location.pathname + '?query=' + encodeURIComponent(query);
        navigator.clipboard.writeText(url).then(() => flashBtn('link-btn', 'Link copied!'));
    };
    el('copy-btn').onclick = () => {
        navigator.clipboard.writeText(toMarkdown()).then(() => flashBtn('copy-btn', 'Copied!'));
    };

    function flashBtn(id, msg) {
        const b = el(id); const old = b.textContent;
        b.textContent = msg; setTimeout(() => { b.textContent = old; }, 1500);
    }

    // Lightweight HTML -> Markdown of the current article (no dependencies).
    function toMarkdown() {
        if (!current) return '';
        let md = '# ' + query + '\n\n';
        if (current.tldr && current.tldr.length) {
            md += '## TL;DR\n' + current.tldr.map((t) => '- ' + t.text).join('\n') + '\n\n';
        }
        el('article').childNodes.forEach((n) => {
            if (n.nodeType !== 1) return;
            const tag = n.tagName.toLowerCase();
            const text = n.textContent.trim();
            if (!text) return;
            if (tag.match(/^h[1-6]$/)) md += '## ' + text + '\n\n';
            else md += text + '\n\n';
        });
        if (current.sources && current.sources.length) {
            md += '## Sources\n' + current.sources
                .map((s) => `${s.id}. [${s.title} — ${s.name}](${s.url})`).join('\n') + '\n';
        }
        return md;
    }
</script>
{% endblock %}
