{% extends "base.html" %}

{% block content %}
<form class="search" action="/results" method="GET">
    <input type="text" name="query" placeholder="Search any topic…" required aria-label="Search a topic">
    <button class="btn" type="submit">Search</button>
</form>

{% if topics %}
<div class="section-label">
    <span>Trending</span>
    <a class="refresh" href="/?refresh=1">Refresh</a>
</div>
<ul class="topics">
    {% for topic in topics %}
    <li>
        <a href="/results?query={{ topic.query | urlencode }}">{{ topic.title }}</a>
        <span class="src">{{ topic.source_count }} source{{ 's' if topic.source_count != 1 }}</span>
    </li>
    {% endfor %}
</ul>
{% endif %}
{% endblock %}
